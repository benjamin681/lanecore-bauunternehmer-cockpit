# Render.com Blueprint — deploys Backend + PostgreSQL
# Deploy: https://render.com/deploy → connect GitHub repo

services:
  - type: web
    name: lanecore-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: lanecore-db
          property: connectionURI
      - key: CORS_ORIGINS
        value: https://lanecore-bauunternehmer-cockpit.vercel.app,http://localhost:3000
      - key: DEV_MODE
        value: "false"

databases:
  - name: lanecore-db
    plan: free
    databaseName: lanecore
    postgresMajorVersion: "16"
