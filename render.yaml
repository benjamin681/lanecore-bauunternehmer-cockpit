# Render.com Blueprint — deploys Backend only
# DB is created separately (Free tier allows only 1)
# Deploy: https://render.com/deploy → connect GitHub repo

services:
  - type: web
    name: lanecore-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: frankfurt
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        sync: false  # Set manually — copy Internal Database URL from existing DB
      - key: CORS_ORIGINS
        value: '["https://frontend-lanecore-ai.vercel.app","http://localhost:3000"]'
      - key: APP_ENV
        value: production
