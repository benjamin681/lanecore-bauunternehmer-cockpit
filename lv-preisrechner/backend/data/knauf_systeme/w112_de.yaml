# W112.de Knauf Metallständerwand
# Einfachständerwerk, zweilagig beplankt
# Quelle: Knauf W11.de Detailblatt 01/2024
# https://knauf.com/api/download-center/v1/assets/8092dada-020a-458f-935c-2e9d6037f627
# Lokal: backend/data/knauf_quellen/W11_de_2024-20260429.pdf
# Abgerufen: 2026-04-29

system_id: W112
bezeichnung: Knauf Metallständerwand W112
variante: Einfachständerwerk, zweilagig beplankt
brandschutz: F30 / F90 (je nach Plattenwahl, siehe W11.de S.10-11)
schalldaemmung_db: 47 - 78  # je Variante
quelle:
  dokument: Knauf W11.de Detailblatt 01/2024
  pdf: backend/data/knauf_quellen/W11_de_2024-20260429.pdf
  abgerufen: 2026-04-29
  seiten:
    - 10  # Systemvarianten W112
    - 11  # Wandhoehen
    - 67  # Befestigung der Beplankung

# WICHTIG: Knauf publiziert KEINE Materialbedarf-pro-m²-Tabelle. Die hier
# angegebenen Mengen sind aus Knauf-Achsabständen + Befestigungsabständen
# ABGELEITET (verified-derived) oder aus Branchen-Standard übernommen
# (industry-standard).

unterkonstruktion:
  ca_profil:
    typ: CW 75
    achsabstand_mm: 625  # Standard. Mit Brandschutz / höherer Wandhöhe: 417 oder 312.5
    quelle_status: verified  # aus W11.de S.9 Wandhoehen-Tabelle
    derived_menge_lfm_pro_m2: 1.6  # = 1m / 0.625m bei Achsabstand 625mm
    notes: |
      Bei Achsabstand 625mm: 1.6 lfm CW pro m² Wandfläche.
      Bei Brandschutz F30+ und größerer Wandhöhe: 417mm (= 2.4 lfm/m²)
      oder 312.5mm (= 3.2 lfm/m²).
  uw_profil:
    typ: UW 75
    quelle_status: verified  # aus W11.de S.9
    derived_menge_lfm_pro_m2: 0.73  # = 2 lfm UW (oben+unten) / 2.75m Standard-Wandhoehe
    notes: |
      2 lfm UW pro m Wandlänge (oben + unten). Pro m² Wandfläche bei
      Standard-Wandhöhe 2.75m: 2/2.75 = 0.73 lfm/m².

beplankung:
  gkb_12_5mm:
    menge_m2_pro_m2: 2.10
    notes: 2 Seiten × 1.05 m² (Standard-Verschnitt 5%) = 2.10 m²/m² Wandfläche
    quelle_status: industry_standard  # nicht direkt aus Knauf-Quelle
  optionen:
    - Knauf Bauplatte 12,5 mm GKB
    - Knauf Feuerschutzplatte (GKF) 12,5 mm
    - Knauf Diamant 12,5 mm
    - Silentboard 12,5 mm

befestigung:
  quelle_status: verified  # aus W11.de S.67
  zweilagig_metall_unterkonstruktion:
    erste_lage:
      schraube: TN 3,5 x 25
      max_abstand_vertikal_mm: 750
      max_abstand_horizontal_mm: 250  # wenn 1250mm Plattenbreite
      derived_menge_stk_pro_m2_je_seite: 5.3
      derived_menge_stk_pro_m2_beidseits: 10.6
      notes: |
        Bei 750mm × 250mm Schraubraster: ca. 5 Schrauben/m² je Plattenseite.
        Beidseitig (W112 ist beidseitig beplankt): 10.6 Stk/m² Wandfläche.
    zweite_lage:
      schraube: TN 3,5 x 35
      max_abstand_vertikal_mm: 250
      max_abstand_horizontal_mm: 200
      derived_menge_stk_pro_m2_je_seite: 20
      derived_menge_stk_pro_m2_beidseits: 40
      notes: |
        Bei 250mm × 200mm Raster: ca. 20 Schrauben/m² je Plattenseite.
        Beidseitig: 40 Stk/m² Wandfläche.

daemmung:
  optionen:
    - Mineralwolle G (brandschutztechnisch zulässig)
  menge_m2_pro_m2: 1.0  # eine Schicht Hohlraum
  rohdichte_min_kg_m3: 60  # für Schallschutz
  quelle_status: verified  # aus W11.de S.10

mat_nrn:
  status: nicht_im_detailblatt
  notes: |
    Knauf publiziert keine Mat-Nrn in den öffentlichen Detailblättern.
    Mat-Nrn müssten aus Knauf-Konfigurator (tools.knauf.de) oder
    Lieferanten-Preisliste (Kemmler) bezogen werden.

praxis_anker:
  ep_richtwert_eur_pro_m2: 62  # Bestätigung Harun's Vater 28.04.2026
  quelle: Trockenbau Feichtenbeiner Ulm (Harun's Vater)
  status: praxis_bestaetigt
