# Render.com Blueprint — LV-Preisrechner Backend
#
# Wichtig: Nutzt die BESTEHENDE Postgres-DB deines Accounts (shared mit Cockpit).
# Alle LV-Preisrechner-Tabellen haben Prefix `lvp_` — keine Kollision.
#
# Deploy:
#   1. Dashboard → New → Blueprint → Blueprint-Pfad: lv-preisrechner/render.yaml
#   2. Im neuen Service "lv-preisrechner-backend" → Environment:
#      - DATABASE_URL  = Internal Database URL der bestehenden Render-Postgres
#      - ANTHROPIC_API_KEY  = dein sk-ant-...
#   3. CORS_ORIGINS nach Vercel-Deploy aktualisieren
#
# Kosten: Free-Tier Backend (Kaltstart ~60s nach 15min Idle), bestehende DB unverändert.
# Prod-Upgrade: Starter $7/Mo (kein Kaltstart).

services:
  - type: web
    name: lv-preisrechner-backend
    runtime: docker
    dockerfilePath: ./lv-preisrechner/backend/Dockerfile
    dockerContext: ./lv-preisrechner/backend
    plan: free
    region: frankfurt
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # manuell: Copy aus bestehender Render-Postgres (Internal Database URL)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CLAUDE_MODEL_PRIMARY
        value: claude-sonnet-4-6
      - key: CLAUDE_MODEL_FALLBACK
        value: claude-opus-4-6
      - key: CORS_ORIGINS
        value: '["https://lv-preisrechner.vercel.app","http://localhost:3100"]'
